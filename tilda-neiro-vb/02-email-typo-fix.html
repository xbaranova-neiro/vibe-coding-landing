<!-- Подключите jQuery в Tilda (Настройки сайта → Ещё → HTML-код в head) если ещё не подключён. -->
<script>
(function () {
  function withJq(fn) {
    if (window.jQuery) return fn(window.jQuery);
    var n = 0;
    var id = setInterval(function () {
      n++;
      if (window.jQuery) {
        clearInterval(id);
        fn(window.jQuery);
      } else if (n > 100) clearInterval(id);
    }, 100);
  }
  withJq(function ($) {
  $(function() {
    var DOMAIN_FIX = {
      'gnail.com': 'gmail.com',
      'gmil.com': 'gmail.com',
      'gnil.com': 'gmail.com',
      'gmail.ru': 'gmail.com',
      'gmai.com': 'gmail.com',
      'gmaol.com': 'gmail.com',
      'gmeil.com': 'gmail.com'
    };
    function fixEmail($input) {
      var v = ($input.val() || '').trim().toLowerCase();
      if (!v || v.indexOf('@') === -1) return;
      var parts = v.split('@');
      if (parts.length !== 2) return;
      var dom = parts[1];
      if (DOMAIN_FIX[dom]) {
        $input.val(parts[0] + '@' + DOMAIN_FIX[dom]);
      }
    }
    setTimeout(function bind() {
      $(document).on('blur', 'input[type="email"], input[name="Email"]', function() {
        fixEmail($(this));
      });
      $(document).on('blur', 'input[placeholder*="mail"], input[placeholder*="Mail"], input[name*="email"], input[name*="Email"]', function() {
        var $t = $(this);
        if ($t.attr('type') === 'email' || ($t.val() || '').indexOf('@') !== -1) fixEmail($t);
      });
    }, 500);
  });
  });
})();
</script>
