    <script>
      (function () {
        var gcOverlay = document.getElementById("vb-gc-overlay");
        var gcSlotMorning = document.getElementById("vb-gc-slot-morning");
        var gcSlotEvening = document.getElementById("vb-gc-slot-evening");
        var gcClose = document.getElementById("vb-gc-overlay-close");

        function closeGcOverlay() {
          if (!gcOverlay) return;
          gcOverlay.classList.remove("vb-gc-overlay--open");
          gcOverlay.setAttribute("aria-hidden", "true");
          document.body.style.overflow = "";
        }

        function openRegForm(slot) {
          if (!gcOverlay || !gcSlotMorning || !gcSlotEvening) return;
          var evening = slot === "evening";
          gcSlotMorning.style.display = evening ? "none" : "block";
          gcSlotEvening.style.display = evening ? "block" : "none";
          gcOverlay.classList.add("vb-gc-overlay--open");
          gcOverlay.setAttribute("aria-hidden", "false");
          document.body.style.overflow = "hidden";
        }

        if (gcClose) gcClose.addEventListener("click", closeGcOverlay);
        if (gcOverlay) {
          gcOverlay.addEventListener("click", function (e) {
            if (e.target === gcOverlay) closeGcOverlay();
          });
        }
        document.addEventListener("keydown", function (e) {
          if (e.key !== "Escape") return;
          if (gcOverlay && gcOverlay.classList.contains("vb-gc-overlay--open")) closeGcOverlay();
        });

        var floatStack = document.getElementById("float-reg-stack");
        if (floatStack) {
          floatStack.style.display = "flex";
          document.body.classList.add("has-float-vb-cta");
        }

        if (window.VIBE_VB) {
          window.VIBE_VB.init({ openRegModal: openRegForm });
        }

        function isFreeWidgetHref(href) {
          if (!href) return false;
          var h = String(href).toLowerCase();
          if (h.indexOf("widget") === -1) return false;
          return h.indexOf("1558793") !== -1 || h.indexOf("1585653") !== -1;
        }

        function makeTimeRegAnchor(slot, hhmm, className) {
          var a = document.createElement("a");
          a.href = "#";
          a.className = ((className || "").trim() + " vb-time-cta-link").trim();
          a.setAttribute("data-vb-open", slot);
          a.appendChild(document.createTextNode("Зарегистрироваться на " + hhmm + " "));
          var sp = document.createElement("span");
          sp.setAttribute("data-vb-hero-date", slot);
          a.appendChild(sp);
          return a;
        }

        /** Все CTA на бесплатную регистрацию → две кнопки «11:00 + дата» и «19:00 + дата». */
        function replaceFreeWidgetLinksWithTimeButtons() {
          var root = document.getElementById("root");
          if (!root) return;
          var links = Array.prototype.slice.call(root.querySelectorAll("a[href]"));
          for (var i = 0; i < links.length; i++) {
            var link = links[i];
            if (link.closest(".vb-time-reg-replace")) continue;
            if (link.getAttribute("data-vb-open")) continue;
            if (!isFreeWidgetHref(link.getAttribute("href") || "")) continue;
            var wrap = document.createElement("div");
            wrap.className = "vb-time-reg-replace";
            var cls = link.className || "";
            wrap.appendChild(makeTimeRegAnchor("morning", "11:00", cls));
            wrap.appendChild(makeTimeRegAnchor("evening", "19:00", cls));
            link.parentNode.insertBefore(wrap, link);
            link.remove();
          }
        }

        /** Кнопка «Записаться на мастер-класс» (скролл к тарифам) → две кнопки по времени. */
        function replaceMasterclassCtaWithTimeButtons() {
          var root = document.getElementById("root");
          if (!root) return;
          var buttons = Array.prototype.slice.call(root.querySelectorAll("button"));
          for (var i = 0; i < buttons.length; i++) {
            var btn = buttons[i];
            if (btn.closest(".vb-time-reg-replace")) continue;
            var t = (btn.textContent || "").replace(/\s+/g, " ").trim();
            if (t.indexOf("Записаться на мастер-класс") === -1) continue;
            var wrap = document.createElement("div");
            wrap.className = "vb-time-reg-replace vb-time-reg-replace--narrow";
            var cls =
              btn.className ||
              "px-8 py-4 rounded-2xl font-bold bg-gradient-main text-white text-center";
            wrap.appendChild(makeTimeRegAnchor("morning", "11:00", cls));
            wrap.appendChild(makeTimeRegAnchor("evening", "19:00", cls));
            btn.parentNode.insertBefore(wrap, btn);
            btn.remove();
          }
        }

        function runTimeRegUi() {
          replaceFreeWidgetLinksWithTimeButtons();
          replaceMasterclassCtaWithTimeButtons();
          if (window.VIBE_VB) window.VIBE_VB.refreshScheduleLabels();
        }

        var _vbRegUiDebounce = null;
        function scheduleFullRegUiRefresh() {
          clearTimeout(_vbRegUiDebounce);
          _vbRegUiDebounce = setTimeout(function () {
            runHide();
            addStartIn3Min();
            runTimeRegUi();
            modifyLinks();
          }, 200);
        }

        /** Оставшиеся ссылки на старый домен → форма регистрации (утро по умолчанию). */
        function modifyLinks() {
          var links = document.querySelectorAll(
            'a[href*="xeniabaranova-school.ru/pl/lite/widget"], a[href*="neyroseti.neiroguru.ru/pl/lite/widget"]'
          );
          var sections = document.querySelectorAll("section");
          var heroSections = [sections[0], sections[1]];

          links.forEach(function (link) {
            if (link.getAttribute("data-vb-modal-bound") === "1") return;
            var section = link.closest("section");
            var isHero = heroSections.indexOf(section) !== -1;
            var href = link.href || "";

            function bind(slot) {
              link.setAttribute("data-vb-modal-bound", "1");
              link.removeAttribute("target");
              link.href = "#";
              link.addEventListener("click", function (e) {
                e.preventDefault();
                openRegForm(slot);
              });
            }

            if (isHero) {
              bind("morning");
            } else if (href.indexOf("id=1585653") !== -1 || href.indexOf("id%3d1585653") !== -1) {
              bind("evening");
            } else if (href.indexOf("id=1558793") !== -1 || href.indexOf("id%3d1558793") !== -1) {
              bind("morning");
            } else if (href.indexOf("id=1558799") !== -1 || href.indexOf("id%3d1558799") !== -1) {
              bind("morning");
            }
          });
        }

        // VIP: дублируем CSS — на случай смены вёрстки (по тексту и по виджету id=1558799)
        function hideVipButtonOnly() {
          var root = document.getElementById("root");
          if (!root) return;
          var links = root.querySelectorAll("a, button");
          for (var i = 0; i < links.length; i++) {
            var el = links[i];
            var t = (el.textContent || "").trim();
            var href = (el.getAttribute("href") || "") + "";
            if (
              href.indexOf("1558799") !== -1 ||
              t.indexOf("Хочу VIP за 570") !== -1 ||
              t === "Хочу VIP за 570 ₽" ||
              t.indexOf("Оплатить VIP 570") !== -1
            ) {
              el.style.setProperty("display", "none", "important");
            }
          }
        }
        // Дублируем CSS (на случай смены классов в бандле): подписи тарифов и VIP-тексты
        function hideCaptionTexts() {
          var root = document.getElementById("root");
          if (!root) return;
          var all = root.querySelectorAll("p, span, div, li");
          for (var i = 0; i < all.length; i++) {
            var el = all[i];
            if (el.children.length > 0) continue;
            var t = (el.textContent || "").trim();
            if (t.length > 120) continue;
            if (
              t.indexOf("VIP — эфир + записи + сертификат") !== -1 ||
              t.indexOf("Бесплатно — только эфир") !== -1 ||
              t.indexOf("Запись и сертификат доступны только в VIP-формате") !== -1 ||
              t.indexOf("Оплатить VIP 570") !== -1
            ) {
              el.style.setProperty("display", "none", "important");
            }
          }
        }
        // Убираем только блок «Выберите формат участия» (секция с карточками Бесплатно/VIP), первый экран не трогаем
        function hideFormatSection() {
          var root = document.getElementById("root");
          if (!root) return;
          var sections = root.querySelectorAll("section");
          for (var i = 0; i < sections.length; i++) {
            var text = (sections[i].textContent || "").toUpperCase();
            var hasTitle = text.indexOf("ВЫБЕРИТЕ ФОРМАТ УЧАСТИЯ") !== -1;
            var hasCards = text.indexOf("БЕСПЛАТНО") !== -1 && (text.indexOf("570") !== -1 || text.indexOf("VIP") !== -1);
            if (hasTitle && hasCards) {
              sections[i].style.setProperty("display", "none", "important");
              return;
            }
          }
        }
        function runHide() {
          hideFormatSection();
          hideVipButtonOnly();
          hideCaptionTexts();
        }

        // Заменяем дату эфира на актуальный текст везде на странице
        function addStartIn3Min() {
          var root = document.getElementById("root");
          if (!root) return;
          var all = root.querySelectorAll("p, span, div, h1, h2, h3, h4, li");
          for (var i = 0; i < all.length; i++) {
            var el = all[i];
            if (el.children.length > 0) continue;
            var t = (el.textContent || "").trim();
            if (t.indexOf("22-23 февраля") !== -1 || t.indexOf("22 февраля") !== -1 || t.indexOf("23 февраля") !== -1) {
              el.textContent = "2-х дневный практический мастер-класс";
            }
          }
        }

        // Анимации появления при скролле (один раз; 0 и 1 — мобильный и десктопный первый экран)
        var _vbScrollAnimInited = false;
        function addScrollAnimations() {
          if (_vbScrollAnimInited) return;
          if (!('IntersectionObserver' in window)) return;
          var root = document.getElementById("root");
          if (!root) return;
          var sections = root.querySelectorAll("section");
          if (!sections.length) return;
          _vbScrollAnimInited = true;
          var observer = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
              if (entry.isIntersecting) {
                entry.target.classList.add('anim-visible');
                entry.target.classList.remove('anim-hidden');
                observer.unobserve(entry.target);
              }
            });
          }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
          sections.forEach(function (section, i) {
            if (i === 0 || i === 1) return;
            if (section.id === "pricing") return;
            section.classList.add('anim-hidden');
            observer.observe(section);
          });
        }

        // React + мобильный/десктопный дубль секций: повторно подхватываем ссылки, пока DOM стабилизируется
        var rootObserved = document.getElementById("root");
        var vbMoDisconnected = false;
        var vbMo = new MutationObserver(function () {
          if (vbMoDisconnected) return;
          var root = document.getElementById("root");
          if (root && root.children.length > 0) {
            scheduleFullRegUiRefresh();
          }
        });
        vbMo.observe(rootObserved, { childList: true, subtree: true });
        setTimeout(function () {
          vbMo.disconnect();
          vbMoDisconnected = true;
        }, 14000);
        setTimeout(function () { runHide(); addStartIn3Min(); runTimeRegUi(); modifyLinks(); addScrollAnimations(); }, 300);
        setTimeout(function () { runHide(); addStartIn3Min(); runTimeRegUi(); modifyLinks(); addScrollAnimations(); }, 800);
        setTimeout(function () { runHide(); addStartIn3Min(); runTimeRegUi(); modifyLinks(); }, 1500);
        setTimeout(function () { addStartIn3Min(); hideCaptionTexts(); runTimeRegUi(); modifyLinks(); }, 2500);

        function showFileOpenHint() {
          var el = document.getElementById("file-open-hint");
          if (el) el.hidden = false;
        }
        window.addEventListener("error", function (e) {
          if (e.filename && String(e.filename).indexOf("index-CrqkIGJg") !== -1) showFileOpenHint();
        }, true);
        setTimeout(function () {
          var r = document.getElementById("root");
          if (r && r.children.length === 0) showFileOpenHint();
        }, 3500);
      })();
    </script>
  </body>
</html>
