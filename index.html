    <!-- Модалка регистрации: как на Тильде — отправка на вебхук Roistat, затем редирект на «Спасибо» GetCourse с метками -->
    <div id="vb-reg-modal" style="display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); align-items:center; justify-content:center;">

        <button type="button" id="vb-reg-close" style="position:absolute; top:12px; right:12px; z-index:10; width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1;">&times;</button>

          <label for="vb-reg-phone">Телефон <span style="font-weight:400;opacity:0.7">(если нет email)</span></label>
          <input id="vb-reg-phone" name="phone" type="tel" autocomplete="tel" placeholder="+7 …" />

    <script>
      (function () {
        // --- Модалка регистрации (схема как Тильда: Roistat webhook → «Спасибо» с UTM + roistat_visit) ---
        var modal = document.getElementById("vb-reg-modal");
        var inner = document.getElementById("vb-reg-inner");
        var closeBtn = document.getElementById("vb-reg-close");
        var regForm = document.getElementById("vb-reg-form");
        var regSlot = document.getElementById("vb-reg-slot");
        var regTitle = document.getElementById("vb-reg-title");
        var regSubtitle = document.getElementById("vb-reg-subtitle");
        var regError = document.getElementById("vb-reg-error");
        var regSubmit = document.getElementById("vb-reg-submit");

        function isMobileViewport() {
          return window.matchMedia && window.matchMedia("(max-width: 1023px)").matches;
        }

        function showRegError(msg) {
          if (!regError) return;
          regError.textContent = msg || "";
          regError.style.display = msg ? "block" : "none";
        }

        function openRegModal(slot) {
          if (!modal || !regForm || !regSlot) return;
          showRegError("");
          regSlot.value = slot === "evening" ? "evening" : "morning";
          if (regTitle) {
            regTitle.textContent =
              slot === "evening" ? "Регистрация — эфир в 19:00" : "Регистрация — эфир в 11:00";
          }
          if (regSubtitle && window.VIBE_VB) {
            var copy = slot === "evening" ? "вечерний слот" : "утренний слот";
            regSubtitle.textContent = "Бесплатный мастер-класс, " + copy + ".";
          }
          regForm.reset();
          regSlot.value = slot === "evening" ? "evening" : "morning";

          var mobile = isMobileViewport();
          modal.classList.toggle("vb-modal-mobile", mobile);

          modal.style.display = "flex";
          document.body.style.overflow = "hidden";
        }

        function closeRegModal() {
          if (!modal) return;
          modal.style.display = "none";
          modal.classList.remove("vb-modal-mobile");
          document.body.style.overflow = "";
          showRegError("");
          if (regSubmit) regSubmit.disabled = false;
        }

        window.addEventListener("resize", function () {
          if (modal && modal.style.display === "flex") {
            var mobile = isMobileViewport();
            modal.classList.toggle("vb-modal-mobile", mobile);
          }
        });

        if (closeBtn) closeBtn.addEventListener("click", closeRegModal);
        if (modal) {
          modal.addEventListener("click", function (e) {
            if (e.target === modal) closeRegModal();
          });
        }
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") closeRegModal();
        });

        if (regForm && window.VIBE_VB) {
          regForm.addEventListener("submit", function (e) {
            e.preventDefault();
            showRegError("");
            var slot = regSlot.value === "evening" ? "evening" : "morning";
            var nameEl = document.getElementById("vb-reg-name");
            var emailEl = document.getElementById("vb-reg-email");
            var phoneEl = document.getElementById("vb-reg-phone");
            var name = nameEl ? nameEl.value : "";
            var email = emailEl ? emailEl.value : "";
            var phone = phoneEl ? phoneEl.value : "";
            if (!window.VIBE_VB.getWebhookUrl || !window.VIBE_VB.getWebhookUrl()) {
              showRegError(
                "Укажите вебхук Roistat: скопируйте js/vb-secrets.example.js → js/vb-secrets.local.js и вставьте URL (файл .local не в git)."
              );
              return;
            }
            if (regSubmit) regSubmit.disabled = true;
            window.VIBE_VB
              .submitLeadToRoistat(slot, { name: name, email: email, phone: phone })
              .then(function () {
                var base = window.VIBE_VB.thankYouBaseForSlot(slot);
                window.location.href = window.VIBE_VB.augmentThankYouUrl(base);
              })
              .catch(function (err) {
                showRegError((err && err.message) || "Не удалось отправить. Попробуйте ещё раз.");
                if (regSubmit) regSubmit.disabled = false;
              });
          });
        }

        var floatStack = document.getElementById("float-reg-stack");
        if (floatStack) {
          floatStack.style.display = "flex";
          document.body.classList.add("has-float-vb-cta");
        }

        if (window.VIBE_VB) {
          window.VIBE_VB.init({ openRegModal: openRegModal });
        }

        function isFreeWidgetHref(href) {
          if (!href) return false;
          var h = String(href).toLowerCase();
          return h.indexOf("1558793") !== -1 && h.indexOf("widget") !== -1;
        }

        function makeTimeRegAnchor(slot, hhmm, className) {
          var a = document.createElement("a");
          a.href = "#";
          a.className = ((className || "").trim() + " vb-time-cta-link").trim();
          a.setAttribute("data-vb-open", slot);
          a.appendChild(document.createTextNode("Зарегистрироваться на " + hhmm + " "));
          var sp = document.createElement("span");
          sp.setAttribute("data-vb-hero-date", slot);
          a.appendChild(sp);
          return a;
        }

        /** Все CTA на бесплатную регистрацию → две кнопки «11:00 + дата» и «19:00 + дата». */
        function replaceFreeWidgetLinksWithTimeButtons() {
          var root = document.getElementById("root");
          if (!root) return;
          var links = Array.prototype.slice.call(root.querySelectorAll("a[href]"));
          for (var i = 0; i < links.length; i++) {
            var link = links[i];
            if (link.closest(".vb-time-reg-replace")) continue;
            if (link.getAttribute("data-vb-open")) continue;
            if (!isFreeWidgetHref(link.getAttribute("href") || "")) continue;
            var wrap = document.createElement("div");
            wrap.className = "vb-time-reg-replace";
            var cls = link.className || "";
            wrap.appendChild(makeTimeRegAnchor("morning", "11:00", cls));
            wrap.appendChild(makeTimeRegAnchor("evening", "19:00", cls));
            link.parentNode.insertBefore(wrap, link);
            link.remove();
          }
        }

        /** Кнопка «Записаться на мастер-класс» (скролл к тарифам) → две кнопки по времени. */
        function replaceMasterclassCtaWithTimeButtons() {
          var root = document.getElementById("root");
          if (!root) return;
          var buttons = Array.prototype.slice.call(root.querySelectorAll("button"));
          for (var i = 0; i < buttons.length; i++) {
            var btn = buttons[i];
            if (btn.closest(".vb-time-reg-replace")) continue;
            var t = (btn.textContent || "").replace(/\s+/g, " ").trim();
            if (t.indexOf("Записаться на мастер-класс") === -1) continue;
            var wrap = document.createElement("div");
            wrap.className = "vb-time-reg-replace vb-time-reg-replace--narrow";
            var cls =
              btn.className ||
              "px-8 py-4 rounded-2xl font-bold bg-gradient-main text-white text-center";
            wrap.appendChild(makeTimeRegAnchor("morning", "11:00", cls));
            wrap.appendChild(makeTimeRegAnchor("evening", "19:00", cls));
            btn.parentNode.insertBefore(wrap, btn);
            btn.remove();
          }
        }

        function runTimeRegUi() {
          replaceFreeWidgetLinksWithTimeButtons();
          replaceMasterclassCtaWithTimeButtons();
          if (window.VIBE_VB) window.VIBE_VB.refreshScheduleLabels();
        }

        var _vbRegUiDebounce = null;
        function scheduleFullRegUiRefresh() {
          clearTimeout(_vbRegUiDebounce);
          _vbRegUiDebounce = setTimeout(function () {
            runHide();
            addStartIn3Min();
            runTimeRegUi();
            modifyLinks();
          }, 200);
        }

        /** Оставшиеся ссылки на старый домен → модалка регистрации (утро по умолчанию). */
        function modifyLinks() {
          var links = document.querySelectorAll(
            'a[href*="xeniabaranova-school.ru/pl/lite/widget"]'
          );
          var sections = document.querySelectorAll("section");
          var heroSections = [sections[0], sections[1]];

          links.forEach(function (link) {
            if (link.getAttribute("data-vb-modal-bound") === "1") return;
            var section = link.closest("section");
            var isHero = heroSections.indexOf(section) !== -1;

            if (isHero) {
              link.setAttribute("data-vb-modal-bound", "1");
              link.removeAttribute("target");
              link.href = "#";
              link.addEventListener("click", function (e) {
                e.preventDefault();
                openRegModal("morning");
              });
            } else if (link.href.indexOf("id=1558793") !== -1) {
              link.setAttribute("data-vb-modal-bound", "1");
              link.removeAttribute("target");
              link.href = "#";
              link.addEventListener("click", function (e) {
                e.preventDefault();
                openRegModal("morning");
              });
            } else if (link.href.indexOf("id=1558799") !== -1) {
              link.setAttribute("data-vb-modal-bound", "1");
              link.removeAttribute("target");
              link.href = "#";
              link.addEventListener("click", function (e) {
                e.preventDefault();
                openRegModal("morning");
              });
            }
          });
        }

        // Убираем только кнопку «Хочу VIP за 570 ₽» (сам элемент a/button, не родители)
        function hideVipButtonOnly() {
          var root = document.getElementById("root");
          if (!root) return;
          var links = root.querySelectorAll("a, button");
          for (var i = 0; i < links.length; i++) {
            var el = links[i];
            var t = (el.textContent || "").trim();
            if (t.indexOf("Хочу VIP за 570") !== -1 || (t === "Хочу VIP за 570 ₽")) {
              el.style.setProperty("display", "none", "important");
            }
          }
        }
        // Убираем только подписи (span/p), не родительские div — иначе на десктопе скрывается
        // вся колонка с «Записаться бесплатно» + «Бесплатно — только эфир» (общий textContent < 80).
        function hideCaptionTexts() {
          var root = document.getElementById("root");
          if (!root) return;
          var all = root.querySelectorAll("p, span");
          for (var i = 0; i < all.length; i++) {
            var el = all[i];
            var t = (el.textContent || "").trim();
            if (t.indexOf("VIP — эфир + записи + сертификат") !== -1 && t.length < 80) {
              el.style.setProperty("display", "none", "important");
            }
            if (t.indexOf("Бесплатно — только эфир") !== -1 && t.length < 80) {
              el.style.setProperty("display", "none", "important");
            }
          }
        }
        // Убираем только блок «Выберите формат участия» (секция с карточками Бесплатно/VIP), первый экран не трогаем
        function hideFormatSection() {
          var root = document.getElementById("root");
          if (!root) return;
          var sections = root.querySelectorAll("section");
          for (var i = 0; i < sections.length; i++) {
            var text = (sections[i].textContent || "").toUpperCase();
            var hasTitle = text.indexOf("ВЫБЕРИТЕ ФОРМАТ УЧАСТИЯ") !== -1;
            var hasCards = text.indexOf("БЕСПЛАТНО") !== -1 && (text.indexOf("570") !== -1 || text.indexOf("VIP") !== -1);
            if (hasTitle && hasCards) {
              sections[i].style.setProperty("display", "none", "important");
              return;
            }
          }
        }
        function runHide() {
          hideFormatSection();
          hideVipButtonOnly();
          hideCaptionTexts();
        }

        // Заменяем дату эфира на актуальный текст везде на странице
        function addStartIn3Min() {
          var root = document.getElementById("root");
          if (!root) return;
          var all = root.querySelectorAll("p, span, div, h1, h2, h3, h4, li");
          for (var i = 0; i < all.length; i++) {
            var el = all[i];
            if (el.children.length > 0) continue;
            var t = (el.textContent || "").trim();
            if (t.indexOf("22-23 февраля") !== -1 || t.indexOf("22 февраля") !== -1 || t.indexOf("23 февраля") !== -1) {
              el.textContent = "2-х дневный практический мастер-класс";
            }
          }
        }

        // Анимации появления при скролле (один раз; 0 и 1 — мобильный и десктопный первый экран)
        var _vbScrollAnimInited = false;
        function addScrollAnimations() {
          if (_vbScrollAnimInited) return;
          if (!('IntersectionObserver' in window)) return;
          var root = document.getElementById("root");
          if (!root) return;
          var sections = root.querySelectorAll("section");
          if (!sections.length) return;
          _vbScrollAnimInited = true;
          var observer = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
              if (entry.isIntersecting) {
                entry.target.classList.add('anim-visible');
                entry.target.classList.remove('anim-hidden');
                observer.unobserve(entry.target);
              }
            });
          }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
          sections.forEach(function (section, i) {
            if (i === 0 || i === 1) return;
            section.classList.add('anim-hidden');
            observer.observe(section);
          });
        }

        // React + мобильный/десктопный дубль секций: повторно подхватываем ссылки, пока DOM стабилизируется
        var rootObserved = document.getElementById("root");
        var vbMoDisconnected = false;
        var vbMo = new MutationObserver(function () {
          if (vbMoDisconnected) return;
          var root = document.getElementById("root");
          if (root && root.children.length > 0) {
            scheduleFullRegUiRefresh();
          }
        });
        vbMo.observe(rootObserved, { childList: true, subtree: true });
        setTimeout(function () {
          vbMo.disconnect();
          vbMoDisconnected = true;
        }, 14000);
        setTimeout(function () { runHide(); addStartIn3Min(); runTimeRegUi(); modifyLinks(); addScrollAnimations(); }, 300);
        setTimeout(function () { runHide(); addStartIn3Min(); runTimeRegUi(); modifyLinks(); addScrollAnimations(); }, 800);
        setTimeout(function () { runHide(); addStartIn3Min(); runTimeRegUi(); modifyLinks(); }, 1500);
        setTimeout(function () { addStartIn3Min(); hideCaptionTexts(); runTimeRegUi(); modifyLinks(); }, 2500);

        function showFileOpenHint() {
          var el = document.getElementById("file-open-hint");
          if (el) el.hidden = false;
        }
        window.addEventListener("error", function (e) {
          if (e.filename && String(e.filename).indexOf("index-CrqkIGJg") !== -1) showFileOpenHint();
        }, true);
        setTimeout(function () {
          var r = document.getElementById("root");
          if (r && r.children.length === 0) showFileOpenHint();
        }, 3500);
      })();
    </script>
  </body>
</html>
